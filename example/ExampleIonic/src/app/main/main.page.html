<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Reteno Demo</ion-title>
    <ion-buttons slot="end">
      <ion-badge class="app-version" color="medium">v0.0.5</ion-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Navigation</ion-card-title>
      <ion-card-subtitle>Choose a demo flow</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" routerLink="/home">User data</ion-button>
      <ion-button expand="block" routerLink="/event">Log event</ion-button>
      <ion-button expand="block" routerLink="/lifecycle">App lifecycle events</ion-button>
      <ion-button expand="block" routerLink="/notifications">Notifications</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
