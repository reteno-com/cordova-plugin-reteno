apply plugin: 'com.android.application'

def retenoFcmVersion = null
if (project.hasProperty('ANDROID_RETENO_FCM_VERSION')) {
    retenoFcmVersion = project.property('ANDROID_RETENO_FCM_VERSION')
} else if (rootProject.ext.has('retenoFcmVersion')) {
    retenoFcmVersion = rootProject.ext.retenoFcmVersion
} else {
    retenoFcmVersion = '2.9.1'
}

android {
    namespace 'com.reteno.plugin'
    compileSdk 35
    //buildToolsVersion '30.0.3'

    defaultConfig {
        applicationId "com.reteno.plugin"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.5.0'
    implementation "com.reteno:fcm:${retenoFcmVersion}"
    implementation "com.google.firebase:firebase-messaging:23.1.0"
    implementation "com.google.firebase:firebase-messaging-ktx:23.1.0"
    implementation "org.apache.cordova:framework:11.0.0"
    implementation 'com.google.code.gson:gson:2.8.9'
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.3'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}