<ion-header [translucent]="true">
  <ion-toolbar>
    @if (showBack) {
      <ion-buttons slot="start">
        <ion-back-button [defaultHref]="defaultHref"></ion-back-button>
      </ion-buttons>
    }
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <app-version-badge></app-version-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
