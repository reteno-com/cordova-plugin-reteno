dependencies {
  implementation "com.reteno:fcm:${retenoFcmVersion}"
  implementation "com.google.firebase:firebase-messaging:${firebaseMessagingVersion}"
  implementation "com.google.code.gson:gson:2.8.9"
}

// ---------------------------------------------------------------------------
// Capacitor: auto-substitute SDK_ACCESS_KEY in the merged plugin manifest.
//
// TODO: Migrate to a dedicated Gradle task with declared inputs/outputs when
//       Configuration Cache becomes the default in Capacitor. Running file I/O
//       at configuration time is incompatible with Configuration Cache and
//       executes on every Gradle invocation (including `./gradlew tasks`).
//
// Capacitor does NOT resolve $VARIABLE placeholders from plugin.xml; it uses
// the <preference default="…"> value instead.  For SDK_ACCESS_KEY the default
// is "MISSING", which makes the SDK fail at runtime.
//
// This block reads the real value from capacitor.config.json (generated by
// Capacitor CLI from capacitor.config.ts) and patches the manifest source
// file so that Android manifest-merger picks up the correct value.
//
// The logic runs at Gradle configuration time (before any build task) and is
// idempotent — it only writes the file when the value actually changes.
// ---------------------------------------------------------------------------
try {
  // Locate the capacitor-cordova-android-plugins manifest relative to the
  // current project.  reteno.gradle can be applied from either the :app
  // module or the :capacitor-cordova-android-plugins module; we handle both.
  def capPluginManifest = null
  def capConfigJson = null

  def rootDir = project.rootDir  // e.g. <project>/android

  // Candidate locations for the plugin manifest.
  def manifestCandidates = [
    new File(rootDir, 'capacitor-cordova-android-plugins/src/main/AndroidManifest.xml'),
    new File(project.projectDir, 'src/main/AndroidManifest.xml'),  // when applied from the plugin module itself
  ]
  for (def f : manifestCandidates) {
    if (f.exists() && f.text.contains('com.reteno.SDK_ACCESS_KEY')) {
      capPluginManifest = f
      break
    }
  }

  // Candidate locations for capacitor.config.json.
  def configCandidates = [
    new File(rootDir, 'app/src/main/assets/capacitor.config.json'),
    new File(project.projectDir, '../app/src/main/assets/capacitor.config.json'),
  ]
  for (def f : configCandidates) {
    if (f.exists()) {
      capConfigJson = f
      break
    }
  }

  if (capPluginManifest != null && capConfigJson != null) {
    def slurper = new groovy.json.JsonSlurper()
    def config = slurper.parse(capConfigJson)
    def prefs = config?.cordova?.preferences
    def accessKey = prefs?.SDK_ACCESS_KEY?.toString()?.trim()

    if (accessKey != null && accessKey.length() > 0 && accessKey != 'MISSING' && accessKey != '$SDK_ACCESS_KEY') {
      def manifestText = capPluginManifest.text
      def pattern = ~/(<meta-data\s+android:name="com\.reteno\.SDK_ACCESS_KEY"\s+android:value=")([^"]*?)(")/
      def matcher = pattern.matcher(manifestText)
      if (matcher.find() && matcher.group(2) != accessKey) {
        def patched = matcher.replaceFirst('$1' + java.util.regex.Matcher.quoteReplacement(accessKey) + '$3')
        capPluginManifest.text = patched
        logger.lifecycle("cordova-plugin-reteno: Patched SDK_ACCESS_KEY in Capacitor plugin manifest.")
      }
    }
  }
} catch (Exception e) {
  logger.info("cordova-plugin-reteno: Could not auto-patch Capacitor manifest (non-fatal): ${e.message}")
}
