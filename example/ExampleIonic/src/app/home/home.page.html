<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Reteno – User attributes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list [formGroup]="form">
    <ion-item>
      <ion-input
        label="External user id"
        labelPlacement="stacked"
        formControlName="externalUserId"
        placeholder="user-123"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Email"
        labelPlacement="stacked"
        formControlName="email"
        placeholder="john.doe@example.com"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Phone"
        labelPlacement="stacked"
        formControlName="phone"
        placeholder="+1234567890"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="First name"
        labelPlacement="stacked"
        formControlName="firstName"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Last name"
        labelPlacement="stacked"
        formControlName="lastName"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Language code"
        labelPlacement="stacked"
        formControlName="languageCode"
        placeholder="en"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Time zone"
        labelPlacement="stacked"
        formControlName="timeZone"
        placeholder="Europe/Kyiv"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Region"
        labelPlacement="stacked"
        formControlName="region"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Town"
        labelPlacement="stacked"
        formControlName="town"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Address"
        labelPlacement="stacked"
        formControlName="address"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Postcode"
        labelPlacement="stacked"
        formControlName="postcode"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Custom field key"
        labelPlacement="stacked"
        formControlName="fieldKey"
        placeholder="plan"
      ></ion-input>
    </ion-item>
    <ion-item>
      <ion-input
        label="Custom field value"
        labelPlacement="stacked"
        formControlName="fieldValue"
        placeholder="premium"
      ></ion-input>
    </ion-item>
  </ion-list>

  <ion-button expand="block" [disabled]="form.invalid" (click)="sendForm()">
    Send form data
  </ion-button>

  @if (status) {
    <ion-text class="status">
      <p>{{ status }}</p>
    </ion-text>
  }
</ion-content>
