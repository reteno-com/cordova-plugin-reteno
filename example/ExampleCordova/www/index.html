<html>
    <head>
        <meta charset="utf-8">
        <!--
        Customize this policy to fit your own app's needs. For more guidance, please refer to the docs:
            https://cordova.apache.org/docs/en/latest/
        Some notes:
            * https://ssl.gstatic.com is required only on Android and is needed for TalkBack to function properly
            * Disables use of inline scripts in order to mitigate risk of XSS vulnerabilities. To change this:
                * Enable inline JS: add 'unsafe-inline' to default-src
        -->
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
        <meta name="color-scheme" content="light dark">
        <link rel="stylesheet" href="css/index.css">
        <title>Hello World</title>
    </head>
    <body>
        <div class="app">
            <h1>Apache Cordova</h1>
            <div id="deviceready" class="blink">
                <p class="event listening">Connecting to Device</p>
                <p class="event received">Device is Ready</p>
            </div>

            <div class="reteno-form" aria-label="Reteno setUserAttributes form">
                <h2>Reteno: setUserAttributes</h2>

                <label class="reteno-label" for="retenoExternalUserId">externalUserId</label>
                <input
                    id="retenoExternalUserId"
                    class="reteno-input"
                    type="text"
                    placeholder="e.g. user_123"
                    autocomplete="off"
                />

                <div class="reteno-section">
                    <div class="reteno-section-title">User attributes</div>

                    <div class="reteno-grid">
                        <div>
                            <label class="reteno-label" for="retenoEmail">email</label>
                            <input id="retenoEmail" class="reteno-input" type="email" autocomplete="off" placeholder="john.doe@example.com" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoPhone">phone</label>
                            <input id="retenoPhone" class="reteno-input" type="tel" autocomplete="off" placeholder="+1234567890" />
                        </div>

                        <div>
                            <label class="reteno-label" for="retenoFirstName">firstName</label>
                            <input id="retenoFirstName" class="reteno-input" type="text" autocomplete="off" placeholder="John" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoLastName">lastName</label>
                            <input id="retenoLastName" class="reteno-input" type="text" autocomplete="off" placeholder="Doe" />
                        </div>

                        <div>
                            <label class="reteno-label" for="retenoLanguageCode">languageCode</label>
                            <input id="retenoLanguageCode" class="reteno-input" type="text" autocomplete="off" placeholder="en" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoTimeZone">timeZone</label>
                            <input id="retenoTimeZone" class="reteno-input" type="text" autocomplete="off" placeholder="Europe/Kyiv" />
                        </div>
                    </div>
                </div>

                <div class="reteno-section">
                    <div class="reteno-section-title">Address (optional)</div>
                    <div class="reteno-grid">
                        <div>
                            <label class="reteno-label" for="retenoAddressRegion">region</label>
                            <input id="retenoAddressRegion" class="reteno-input" type="text" autocomplete="off" placeholder="Kyiv" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoAddressTown">town</label>
                            <input id="retenoAddressTown" class="reteno-input" type="text" autocomplete="off" placeholder="Kyiv" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoAddressLine">address</label>
                            <input id="retenoAddressLine" class="reteno-input" type="text" autocomplete="off" placeholder="Main street 1" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoAddressPostcode">postcode</label>
                            <input id="retenoAddressPostcode" class="reteno-input" type="text" autocomplete="off" placeholder="01001" />
                        </div>
                    </div>
                </div>

                <div class="reteno-section">
                    <div class="reteno-section-title">Custom field (optional)</div>
                    <div class="reteno-grid">
                        <div>
                            <label class="reteno-label" for="retenoFieldKey">key</label>
                            <input id="retenoFieldKey" class="reteno-input" type="text" autocomplete="off" placeholder="plan" />
                        </div>
                        <div>
                            <label class="reteno-label" for="retenoFieldValue">value</label>
                            <input id="retenoFieldValue" class="reteno-input" type="text" autocomplete="off" placeholder="premium" />
                        </div>
                    </div>
                </div>

                <button id="retenoSetUserAttributesBtn" class="reteno-button" type="button">
                    Send setUserAttributes
                </button>

                <pre id="retenoStatus" class="reteno-status" aria-live="polite"></pre>
            </div>
        </div>
        <script src="cordova.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
