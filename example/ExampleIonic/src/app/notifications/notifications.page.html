<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/main"></ion-back-button>
    </ion-buttons>
    <ion-title>Reteno – Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-badge class="app-version" color="medium">v0.0.5</ion-badge>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-input
          label="Channel name"
          labelPlacement="stacked"
          formControlName="name"
          placeholder="Updates"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          label="Channel description"
          labelPlacement="stacked"
          formControlName="description"
          placeholder="General updates and announcements"
        ></ion-input>
      </ion-item>
    </ion-list>

    <ion-button expand="block" [disabled]="form.invalid" (click)="apply()">
      Apply
    </ion-button>
  </form>

  @if (status) {
    <ion-text class="status">
      <p>{{ status }}</p>
    </ion-text>
  }
</ion-content>
